<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus — Login</title>
    <style>
        /* CSS Wahi purana wala rakhein taake design change na ho */
        body { background: #0b0d11; color: #f0f2f8; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: #111318; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #333; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #181b22; border: 1px solid #333; color: white; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #4f7cff; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Sign In to Nexus</h2>
    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Enter password">
    </div>
    <button onclick="doMockLogin()">Sign In to Nexus →</button>
</div>

<script>
    function doMockLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;

        // Validation: Sirf check kar raha hai ke khali na ho
        if (email === "" || pass.length < 6) {
            alert("Please enter a valid email and password (min 6 chars)");
            return;
        }

        // MOCK LOGIN SUCCESS
        alert("Login Successful! Welcome to Nexus.");
        
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
    }
</script>

</body>
</html>
