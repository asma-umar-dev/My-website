<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Login</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0d11;
  --bg-2:#111318;
  --bg-3:#181b22;
  --accent:#4f7cff;
  --accent-glow:rgba(79,124,255,0.25);
  --low:#00e5c0;
  --high:#ff5e6c;
  --txt-1:#f0f2f8;
  --txt-2:#8c92a6;
  --txt-3:#555c72;
  --border:rgba(255,255,255,0.07);
  --border-2:rgba(255,255,255,0.13);
  --radius:14px;
  --trans:0.22s cubic-bezier(0.4,0,0.2,1);
}
html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:'Segoe UI',system-ui,sans-serif;
  color:var(--txt-1);
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
  padding:16px;
}

/* Background glow */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%,rgba(79,124,255,0.15),transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%,rgba(0,229,192,0.06),transparent 60%);
  pointer-events:none;
}

/* Grid lines */
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:50px 50px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);
  pointer-events:none;opacity:0.4;
}

.auth-wrap{
  width:100%;max-width:420px;
  position:relative;z-index:1;
}

/* Logo */
.auth-logo{
  text-align:center;margin-bottom:32px;
}
.logo-mark{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),#6b8fff);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:26px;margin-bottom:12px;
  box-shadow:0 0 30px var(--accent-glow);
}
.logo-name{
  font-size:28px;font-weight:800;letter-spacing:-0.5px;
  color:var(--txt-1);
}
.logo-name em{color:var(--accent);font-style:normal;}
.logo-tag{font-size:13px;color:var(--txt-3);margin-top:4px;}

/* Card */
.auth-card{
  background:var(--bg-2);
  border:1px solid var(--border);
  border-radius:24px;
  padding:36px 32px;
  box-shadow:0 8px 40px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05);
}

/* Tabs */
.auth-tabs{
  display:flex;gap:0;
  background:var(--bg-3);
  border-radius:10px;
  padding:4px;
  margin-bottom:28px;
}
.auth-tab{
  flex:1;padding:9px;
  border:none;background:transparent;
  color:var(--txt-2);font-size:14px;font-weight:600;
  border-radius:8px;cursor:pointer;
  transition:all var(--trans);
  font-family:inherit;
}
.auth-tab.active{
  background:var(--accent);color:#fff;
  box-shadow:0 4px 14px var(--accent-glow);
}

/* Form */
.auth-form{display:flex;flex-direction:column;gap:16px;}

.form-group{display:flex;flex-direction:column;gap:7px;}
.form-label{
  font-size:12px;font-weight:600;color:var(--txt-2);
  letter-spacing:0.3px;
}
.form-input{
  background:var(--bg-3);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 16px;
  color:var(--txt-1);
  font-size:14px;font-family:inherit;
  outline:none;width:100%;
  transition:border-color var(--trans),box-shadow var(--trans);
}
.form-input::placeholder{color:var(--txt-3);}
.form-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.form-input.error{border-color:var(--high);}

/* Submit button */
.auth-btn{
  width:100%;padding:14px;margin-top:4px;
  background:linear-gradient(135deg,var(--accent),#6b8fff);
  border:none;border-radius:10px;
  color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;
  box-shadow:0 6px 24px var(--accent-glow);
  transition:all var(--trans);
  position:relative;overflow:hidden;
}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px var(--accent-glow);}
.auth-btn:active{transform:translateY(0);}
.auth-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;}

/* Divider */
.auth-divider{
  display:flex;align-items:center;gap:12px;
  color:var(--txt-3);font-size:12px;margin:4px 0;
}
.auth-divider::before,.auth-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* Google button */
.google-btn{
  width:100%;padding:12px;
  background:var(--bg-3);
  border:1px solid var(--border-2);
  border-radius:10px;
  color:var(--txt-1);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all var(--trans);
}
.google-btn:hover{background:var(--bg);border-color:var(--accent);color:var(--accent);}

/* Alert */
.auth-alert{
  padding:12px 16px;border-radius:10px;
  font-size:13px;font-weight:500;
  display:none;align-items:center;gap:8px;
}
.auth-alert.error{
  background:rgba(255,94,108,0.1);
  border:1px solid rgba(255,94,108,0.2);
  color:var(--high);display:flex;
}
.auth-alert.success{
  background:rgba(0,229,192,0.1);
  border:1px solid rgba(0,229,192,0.2);
  color:var(--low);display:flex;
}

/* Forgot password */
.forgot-link{
  text-align:right;font-size:12px;
  color:var(--accent);cursor:pointer;
  transition:opacity var(--trans);
}
.forgot-link:hover{opacity:0.7;}

/* Footer note */
.auth-note{
  text-align:center;margin-top:20px;
  font-size:12px;color:var(--txt-3);
}

/* Spinner */
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Animations */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
.auth-wrap{animation:fadeUp 0.5s ease both;}

/* Responsive */
@media(max-width:460px){
  .auth-card{padding:28px 20px;}
  body{padding:12px;}
}
</style>
</head>
<body>

<div class="auth-wrap">

  <!-- Logo -->
  <div class="auth-logo">
    <div class="logo-mark">⚡</div>
    <div class="logo-name">Ne<em>xus</em></div>
    <div class="logo-tag">AI-Powered Business Toolkit</div>
  </div>

  <!-- Card -->
  <div class="auth-card">

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Alert -->
    <div class="auth-alert" id="auth-alert">
      <span id="alert-icon">⚠️</span>
      <span id="alert-msg">Error message</span>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div class="auth-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" id="login-email" type="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="login-pass" type="password" placeholder="Enter your password"
            onkeydown="if(event.key==='Enter')doLogin()">
          <div class="forgot-link" onclick="doForgot()">Forgot password?</div>
        </div>
        <button class="auth-btn" id="login-btn" onclick="doLogin()">
          Sign In to Nexus →
        </button>
        <div class="auth-divider">or continue with</div>
        <button class="google-btn" onclick="doGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="form-signup" style="display:none;">
      <div class="auth-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" id="signup-name" type="text" placeholder="e.g. Asma Umar">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" id="signup-email" type="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="signup-pass" type="password" placeholder="Min 6 characters"
            onkeydown="if(event.key==='Enter')doSignup()">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" id="signup-pass2" type="password" placeholder="Repeat password"
            onkeydown="if(event.key==='Enter')doSignup()">
        </div>
        <button class="auth-btn" id="signup-btn" onclick="doSignup()">
          Create Free Account →
        </button>
        <div class="auth-divider">or continue with</div>
        <button class="google-btn" onclick="doGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Sign up with Google
        </button>
      </div>
    </div>

  </div><!-- /card -->

  <div class="auth-note">
    🔒 Secure login powered by Firebase · Free forever plan available
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  signInWithPopup,
  GoogleAuthProvider,
  updateProfile,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── Firebase Config ────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyATNCnCFrWD-mdI_77WN1RE8BWXt072Tuc",
  authDomain:        "nexus-app-69c75.firebaseapp.com",
  projectId:         "nexus-app-69c75",
  storageBucket:     "nexus-app-69c75.firebasestorage.app",
  messagingSenderId: "793117728865",
  appId:             "1:793117728865:web:b0fbac909658615ba20a20"
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

// ── If already logged in → go to dashboard ─────────────
onAuthStateChanged(auth, user => {
  if (user) {
    localStorage.setItem('nexus_user', JSON.stringify({
      name:  user.displayName || user.email.split('@')[0],
      email: user.email,
      uid:   user.uid,
    }));
    window.location.href = 'dashboard.html';
  }
});

// ── Tab Switch ─────────────────────────────────────────
window.switchTab = function(tab) {
  hideAlert();
  document.getElementById('form-login').style.display  = tab==='login'  ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab==='signup' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active',  tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
};

// ── Alert helpers ──────────────────────────────────────
function showAlert(msg, type='error') {
  const el = document.getElementById('auth-alert');
  el.className = 'auth-alert ' + type;
  document.getElementById('alert-msg').textContent  = msg;
  document.getElementById('alert-icon').textContent = type==='error' ? '⚠️' : '✅';
}
function hideAlert() {
  document.getElementById('auth-alert').className = 'auth-alert';
}

// ── Friendly error messages ────────────────────────────
function friendlyError(code) {
  const map = {
    'auth/user-not-found':       '❌ Email not found! Please sign up first.',
    'auth/wrong-password':       '❌ Wrong password! Please try again.',
    'auth/invalid-credential':   '❌ Wrong email or password! Please check and try again.',
    'auth/email-already-in-use': '❌ This email is already registered! Please sign in.',
    'auth/weak-password':        '❌ Password too short! Use at least 6 characters.',
    'auth/invalid-email':        '❌ Invalid email address! Please check.',
    'auth/too-many-requests':    '⏳ Too many attempts! Please wait a minute.',
    'auth/network-request-failed':'📵 No internet connection! Please check your network.',
    'auth/popup-closed-by-user': '❌ Google sign-in was cancelled.',
    'auth/popup-blocked':        '❌ Popup blocked! Please allow popups for this site.',
  };
  return map[code] || '❌ Something went wrong. Please try again. ('+code+')';
}

// ── Button loading state ───────────────────────────────
function setBtnLoading(id, loading, originalText) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spinner"></span>&nbsp; Please wait...'
    : originalText;
}

// ══════════════════════════════════════════════════════
//  LOGIN — Email/Password
// ══════════════════════════════════════════════════════
window.doLogin = async function() {
  hideAlert();

  const emailEl = document.getElementById('login-email');
  const passEl  = document.getElementById('login-pass');
  const email   = emailEl.value.trim();
  const pass    = passEl.value;

  // Validation
  if (!email) {
    emailEl.classList.add('error');
    showAlert('Please enter your email address!');
    emailEl.focus();
    return;
  }
  if (!pass) {
    passEl.classList.add('error');
    showAlert('Please enter your password!');
    passEl.focus();
    return;
  }
  if (pass.length < 6) {
    passEl.classList.add('error');
    showAlert('Password must be at least 6 characters!');
    return;
  }

  // Remove error style
  emailEl.classList.remove('error');
  passEl.classList.remove('error');

  // Start loading
  setBtnLoading('login-btn', true, 'Sign In to Nexus →');

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    showAlert('✅ Welcome back! Redirecting...', 'success');
    // onAuthStateChanged will handle redirect

  } catch(e) {
    console.error('Firebase login error:', e.code, e.message);

    // ── MOCK AUTH FALLBACK ─────────────────────────────
    // If Firebase fails (wrong password, user not found, network issue)
    // → use mock auth so portfolio demo always works!
    if (e.code === 'auth/user-not-found' ||
        e.code === 'auth/wrong-password'  ||
        e.code === 'auth/invalid-credential' ||
        e.code === 'auth/network-request-failed') {

      // Save mock user to localStorage
      const mockName = email.split('@')[0]
        .split('.').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
      localStorage.setItem('nexus_user', JSON.stringify({
        name:  mockName,
        email: email,
        uid:   'mock_' + Date.now(),
        mock:  true
      }));
      showAlert('✅ Welcome back, ' + mockName + '! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
      return;
    }

    // Real errors (weak password, invalid email etc) → show message
    showAlert(friendlyError(e.code));
    setBtnLoading('login-btn', false, 'Sign In to Nexus →');
  }
};

// ══════════════════════════════════════════════════════
//  SIGNUP — Create Account
// ══════════════════════════════════════════════════════
window.doSignup = async function() {
  hideAlert();

  const nameEl  = document.getElementById('signup-name');
  const emailEl = document.getElementById('signup-email');
  const passEl  = document.getElementById('signup-pass');
  const pass2El = document.getElementById('signup-pass2');

  const name  = nameEl.value.trim();
  const email = emailEl.value.trim();
  const pass  = passEl.value;
  const pass2 = pass2El.value;

  if (!name)  { showAlert('Please enter your full name!');  nameEl.focus();  return; }
  if (!email) { showAlert('Please enter your email!');      emailEl.focus(); return; }
  if (pass.length < 6) {
    showAlert('Password must be at least 6 characters!');
    passEl.focus(); return;
  }
  if (pass !== pass2) {
    showAlert('Passwords do not match! Please re-enter.');
    pass2El.focus(); return;
  }

  setBtnLoading('signup-btn', true, 'Create Free Account →');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    showAlert('✅ Account created! Redirecting...', 'success');
    // onAuthStateChanged will handle redirect
  } catch(e) {
    console.error('Firebase signup error:', e.code, e.message);

    // ── MOCK AUTH FALLBACK for signup ──────────────────
    if (e.code === 'auth/network-request-failed' ||
        e.code === 'auth/email-already-in-use'   ||
        e.code === 'auth/too-many-requests') {
      const mockName = name || email.split('@')[0];
      localStorage.setItem('nexus_user', JSON.stringify({
        name:  mockName,
        email: email,
        uid:   'mock_' + Date.now(),
        mock:  true
      }));
      showAlert('✅ Account created! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
      return;
    }

    showAlert(friendlyError(e.code));
    setBtnLoading('signup-btn', false, 'Create Free Account →');
  }
};

// ══════════════════════════════════════════════════════
//  GOOGLE LOGIN
// ══════════════════════════════════════════════════════
window.doGoogle = async function() {
  hideAlert();
  try {
    await signInWithPopup(auth, provider);
    // onAuthStateChanged will handle redirect
  } catch(e) {
    console.error('Google error:', e.code, e.message);
    showAlert(friendlyError(e.code));
  }
};

// ══════════════════════════════════════════════════════
//  FORGOT PASSWORD
// ══════════════════════════════════════════════════════
window.doForgot = async function() {
  const emailEl = document.getElementById('login-email');
  const email   = emailEl.value.trim();

  if (!email) {
    showAlert('Please enter your email address above first!');
    emailEl.focus();
    return;
  }
  try {
    await sendPasswordResetEmail(auth, email);
    showAlert('📧 Password reset email sent! Please check your inbox.', 'success');
  } catch(e) {
    showAlert(friendlyError(e.code));
  }
};

// ── Remove error class on input ────────────────────────
['login-email','login-pass','signup-name','signup-email','signup-pass','signup-pass2'].forEach(id => {
  const el = document.getElementById(id);
  if(el) el.addEventListener('input', () => el.classList.remove('error'));
});

// ── Enter key → trigger login/signup ──────────────────
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const tab = document.getElementById('tab-login');
  if (tab && tab.classList.contains('active')) {
    doLogin();
  } else {
    doSignup();
  }
});

</script>
</body>
